<!DOCTYPE html>
<html>
<head>
    <title>Uzima VM Control</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; text-align: center; }
        button { 
            padding: 10px 20px; 
            margin: 10px; 
            font-size: 16px; 
            cursor: pointer; 
        }
        #startBtn { 
            background-color: #4CAF50; 
            color: white; 
            border: none;
            border-radius: 4px;
        }
        #stopBtn { 
            background-color: #f44336; 
            color: white; 
            border: none;
            border-radius: 4px;
        }
        #status { 
            margin: 20px; 
            padding: 10px;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Uzima VM Control Panel</h1>
    <button id="startBtn">Start VM</button>
    <button id="stopBtn">Stop VM</button>
    <div id="status">Status: Ready</div>

    <script>
        // Replace these with your webhook URLs
        const START_WEBHOOK_URL = "https://c1b86629-139b-420c-83ac-ee0d882dfe70.webhook.ne.azure-automation.net/webhooks?token=XJnARFlkbW%2fbxeBAToejKDsE%2beqs2NnGbgOmlJVwOQ4%3d";
        const STOP_WEBHOOK_URL = "https://c1b86629-139b-420c-83ac-ee0d882dfe70.webhook.ne.azure-automation.net/webhooks?token=ewb5VijdGH1x2OACTGkQBzqOIOm%2fa8EaRHug6vogKAk%3d";

        document.getElementById('startBtn').addEventListener('click', () => {
            fetch(START_WEBHOOK_URL, { method: 'POST' })
                .then(() => updateStatus("Starting VM..."))
                .catch(err => updateStatus("Error: " + err));
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            fetch(STOP_WEBHOOK_URL, { method: 'POST' })
                .then(() => updateStatus("Stopping VM..."))
                .catch(err => updateStatus("Error: " + err));
        });

        function updateStatus(message) {
            document.getElementById('status').textContent = "Status: " + message;
        }
    </script>
</body>
</html>
